<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Coin Toss 3D Demo</title>
    <style>
        :root {
            --bg1: #040a1d;
            --bg2: #0b1939;
            --ring: rgba(122, 162, 255, 0.35);
            --shadow: rgba(6, 12, 26, 0.7);
        }

        * { box-sizing: border-box; }
        html, body { margin: 0; height: 100%; }

        body {
            display: grid;
            place-items: center;
            overflow: hidden;
            background:
                    radial-gradient(80vw 50vh at 50% 125%, rgba(64, 102, 180, 0.35), transparent 60%),
                    radial-gradient(70vw 40vh at 50% -10%, rgba(70, 115, 210, 0.15), transparent 70%),
                    linear-gradient(180deg, var(--bg2), var(--bg1));
            color: #fff;
            font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            perspective: 1200px;
        }

        .scene {
            position: relative;
            width: min(72vw, 460px);
            aspect-ratio: 1 / 1;
            transform-style: preserve-3d;
            display: grid;
            place-items: center;
        }

        .arena {
            position: absolute;
            width: 78%;
            aspect-ratio: 1 / 1;
            border-radius: 50%;
            background: radial-gradient(circle at 50% 45%, rgba(100, 140, 240, 0.18), rgba(30, 45, 92, 0.06));
            border: 1px solid var(--ring);
            box-shadow: 0 0 40px rgba(63, 118, 255, 0.28), inset 0 0 26px rgba(77, 130, 255, 0.22);
            transform: translateY(110px) rotateX(78deg);
            filter: blur(0.2px);
        }

        .coin-wrap {
            position: relative;
            width: 170px;
            height: 170px;
            transform-style: preserve-3d;
            animation: launch-and-bounce 2800ms cubic-bezier(0.19, 0.85, 0.25, 1) forwards;
            will-change: transform;
        }

        .coin-shadow {
            position: absolute;
            width: 132px;
            height: 30px;
            left: 50%;
            top: 128px;
            transform: translateX(-50%);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(5, 10, 22, 0.68), rgba(5, 10, 22, 0) 70%);
            filter: blur(3px);
            animation: shadow-react 2800ms ease-out forwards;
        }

        .coin {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            animation: spin-coin 2800ms linear forwards;
        }

        .face {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            backface-visibility: hidden;
            overflow: hidden;
            border: 4px solid #d1a23a;
            box-shadow:
                    inset 0 0 0 2px rgba(255, 235, 170, 0.45),
                    inset 0 -12px 22px rgba(80, 40, 0, 0.22),
                    0 10px 22px rgba(0, 0, 0, 0.4);
        }

        .front {
            background:
                    radial-gradient(circle at 30% 28%, #fff8d5, #f4cf69 43%, #b67816 80%);
            transform: translateZ(5px);
        }

        .back {
            background:
                    radial-gradient(circle at 68% 68%, #fff3bc, #e9bc52 44%, #8d540b 86%);
            transform: rotateY(180deg) translateZ(5px);
        }

        .rim {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            transform: rotateY(90deg);
            background: linear-gradient(180deg, #e5bd63, #9a6518);
            width: 10px;
            left: calc(50% - 5px);
            box-shadow: 0 0 2px rgba(0, 0, 0, 0.55);
        }

        .badge {
            position: absolute;
            bottom: -44px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 700;
            font-size: 14px;
            color: #cbd8ff;
            letter-spacing: 0.04em;
            opacity: 0.82;
        }

        @keyframes launch-and-bounce {
            0% {
                transform: translate3d(0, 70px, 0) scale(0.82);
            }
            16% {
                transform: translate3d(0, -30px, 160px) scale(1.05);
            }
            34% {
                transform: translate3d(0, -130px, 420px) scale(1.45);
            }
            56% {
                transform: translate3d(0, -60px, 230px) scale(1.18);
            }
            72% {
                transform: translate3d(0, 55px, 0) scale(0.95);
            }
            82% {
                transform: translate3d(0, 28px, 40px) scale(1.02);
            }
            92% {
                transform: translate3d(0, 56px, 0) scale(0.99);
            }
            100% {
                transform: translate3d(0, 54px, 0) scale(1);
            }
        }

        @keyframes spin-coin {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(2880deg) rotateY(1240deg) rotateZ(56deg); }
        }

        @keyframes shadow-react {
            0% {
                opacity: 0.8;
                transform: translateX(-50%) scale(1.1);
            }
            34% {
                opacity: 0.22;
                transform: translateX(-50%) scale(0.6);
            }
            72% {
                opacity: 0.88;
                transform: translateX(-50%) scale(1.2);
            }
            82% {
                opacity: 0.62;
                transform: translateX(-50%) scale(0.86);
            }
            100% {
                opacity: 0.84;
                transform: translateX(-50%) scale(1);
            }
        }
    </style>
</head>
<body>
<div class="scene">
    <div class="arena"></div>
    <div class="coin-shadow"></div>
    <div class="coin-wrap" id="coinWrap">
        <div class="coin">
            <div class="face front"></div>
            <div class="face back"></div>
            <div class="rim"></div>
        </div>
    </div>
    <div class="badge">3D Coin Toss Motion Demo</div>
</div>

<script>
    const wrap = document.getElementById('coinWrap');
    wrap.addEventListener('animationend', () => {
        setTimeout(() => {
            wrap.style.animation = 'none';
            wrap.offsetHeight;
            wrap.style.animation = '';
        }, 700);
    });
</script>
</body>
</html>
