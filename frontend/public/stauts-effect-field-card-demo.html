<!doctype html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Status Effect Field Card Demo</title>
    <style>
        :root {
            --bg: #0a1020;
            --panel: #111a31;
            --card: #1c2744;
            --line: #2a3d69;
            --text: #e8efff;
            --muted: #8ca0cb;
            --accent: #5fb9ff;
            --danger: #ff6d4c;
            --ok: #4ade80;
        }

        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--text);
            background:
                    radial-gradient(circle at 20% 15%, #233a72 0%, transparent 36%),
                    radial-gradient(circle at 80% 20%, #2e224f 0%, transparent 35%),
                    linear-gradient(145deg, #080d1b 0%, #0e1630 55%, #0c1328 100%);
            min-height: 100vh;
            padding: 24px;
            display: grid;
            grid-template-columns: 340px minmax(320px, 1fr);
            gap: 22px;
        }

        .panel {
            background: rgba(16, 26, 47, 0.82);
            border: 1px solid var(--line);
            border-radius: 14px;
            backdrop-filter: blur(6px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
        }

        .controls {
            padding: 16px;
            overflow: auto;
            max-height: calc(100vh - 48px);
        }

        h1 { margin: 0 0 8px; font-size: 18px; }
        .sub { color: var(--muted); font-size: 13px; margin-bottom: 14px; line-height: 1.5; }

        .group {
            margin-bottom: 14px;
            border: 1px solid #25375e;
            border-radius: 10px;
            padding: 10px;
            background: rgba(13, 21, 39, 0.6);
        }
        .group h2 { margin: 0 0 8px; font-size: 13px; color: #aecdff; }

        .toggle {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            padding: 7px 8px;
            border-radius: 8px;
            font-size: 13px;
        }
        .toggle:hover { background: rgba(95, 185, 255, 0.08); }
        .toggle input { transform: scale(1.04); }

        .preset {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn {
            border: 1px solid #3a5589;
            background: #14223f;
            color: #dbe7ff;
            border-radius: 8px;
            padding: 7px 10px;
            font-size: 12px;
            cursor: pointer;
        }
        .btn:hover { border-color: #5fa7ff; background: #19305d; }

        .stage {
            padding: 24px;
            display: grid;
            place-items: center;
            position: relative;
            overflow: hidden;
        }

        .field {
            width: min(92%, 860px);
            min-height: 420px;
            border: 1px dashed #375286;
            border-radius: 16px;
            display: grid;
            place-items: center;
            position: relative;
            background: linear-gradient(180deg, rgba(17,28,53,0.6), rgba(8,14,29,0.45));
        }

        .card-wrap {
            position: relative;
            width: 205px;
            height: 285px;
            transition: transform 0.28s ease;
            animation: idleFloat 3s ease-in-out infinite;
        }

        .field-card {
            position: relative;
            width: 100%; height: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 2px solid #72a8ff;
            background: linear-gradient(180deg, #21345d 0%, #172540 50%, #131f37 100%);
            box-shadow: 0 12px 34px rgba(10, 25, 57, 0.55);
            transition: 220ms ease;
            isolation: isolate;
        }

        .hero-art {
            height: 48%;
            margin: 10px 10px 0;
            border-radius: 12px;
            background:
                    radial-gradient(circle at 50% 24%, #b4d6ff 0%, #8db9ff 15%, #5f8fdf 35%, #344d82 100%);
            border: 1px solid rgba(255,255,255,0.2);
            position: relative;
            overflow: hidden;
        }

        .hero-art::after {
            content: "SOJOURN";
            position: absolute;
            bottom: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 13px;
            letter-spacing: 1px;
            font-weight: 900;
            color: rgba(9, 16, 31, 0.8);
            text-shadow: 0 1px 0 rgba(255,255,255,0.35);
        }

        .meta { padding: 10px; }
        .name { font-weight: 800; font-size: 15px; }
        .desc { font-size: 12px; color: #b7c8ec; margin-top: 4px; }

        .stats {
            position: absolute;
            left: 10px;
            right: 10px;
            bottom: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            font-weight: 700;
        }
        .hp { color: #74f5a4; }
        .atk { color: #ffd164; }
        .rng { color: #9ac5ff; }

        .badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(6,10,20,0.7);
            border: 1px solid #4f6996;
            border-radius: 999px;
            padding: 3px 8px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: .5px;
            opacity: 0;
            transform: translateY(-6px);
            transition: 160ms;
        }
        .badge.show { opacity: 1; transform: translateY(0); }

        .effect-tags {
            position: absolute;
            right: 8px;
            top: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: flex-end;
            max-width: 120px;
        }
        .effect-tags span {
            font-size: 10px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 999px;
            background: rgba(16,23,41,0.72);
            border: 1px solid #44609a;
            color: #d7e4ff;
        }

        /* Core effects */
        .field-card.stealth,
        .field-card.burrowed {
            opacity: 0.46;
            filter: saturate(0.72);
        }
        .field-card.burrowed { filter: saturate(0.6) blur(0.4px); }

        .card-wrap.airborne {
            transform: translateY(-10px);
            animation: airborneHover 1.8s ease-in-out infinite;
        }
        .card-wrap.airborne::after {
            content: "";
            position: absolute;
            left: 20%; right: 20%; bottom: -8px;
            height: 12px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(126,216,255,.45), rgba(126,216,255,0));
            filter: blur(1px);
        }

        .field-card.exposed { box-shadow: 0 0 0 2px rgba(255, 150, 150, .55), 0 12px 34px rgba(10,25,57,.55); }
        .field-card.hooked { transform: rotate(-3deg); }
        .field-card.pulled { transform: translateX(-8px); }
        .field-card.frozen_state { filter: contrast(1.05) saturate(0.6) hue-rotate(170deg); }

        /* Burn border */
        .field-card.burn::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 18px;
            background:
                    conic-gradient(from 0deg,
                    rgba(255,126,64,.0) 0deg,
                    rgba(255,126,64,.9) 55deg,
                    rgba(255,189,88,.95) 98deg,
                    rgba(255,88,42,.92) 145deg,
                    rgba(255,126,64,.05) 190deg,
                    rgba(255,126,64,.92) 240deg,
                    rgba(255,214,114,.86) 290deg,
                    rgba(255,126,64,.0) 360deg);
            z-index: -1;
            filter: blur(1px);
            animation: burnBorder 1.3s linear infinite;
        }

        .field-card.burn::after {
            content: "";
            position: absolute;
            left: -8px;
            right: -8px;
            top: -14px;
            height: 34px;
            background:
                    radial-gradient(12px 20px at 12% 100%, rgba(255, 146, 60, .95), transparent 68%),
                    radial-gradient(14px 24px at 27% 100%, rgba(255, 100, 42, .9), transparent 70%),
                    radial-gradient(10px 18px at 42% 100%, rgba(255, 174, 74, .9), transparent 72%),
                    radial-gradient(13px 20px at 61% 100%, rgba(255, 113, 47, .88), transparent 72%),
                    radial-gradient(10px 18px at 78% 100%, rgba(255, 186, 85, .85), transparent 72%),
                    radial-gradient(12px 20px at 92% 100%, rgba(255, 96, 42, .88), transparent 72%);
            opacity: .85;
            mix-blend-mode: screen;
            pointer-events: none;
            animation: flameDance 0.85s ease-in-out infinite alternate;
        }

        .field-card.heal_block { box-shadow: 0 0 0 2px rgba(255, 83, 120, .6), 0 12px 34px rgba(10,25,57,.55); }
        .field-card.taunt { box-shadow: 0 0 0 2px rgba(255, 201, 99, .7), 0 0 14px rgba(255, 201, 99, .4); }
        .field-card.damage_reduction { box-shadow: 0 0 0 2px rgba(108, 182, 255, .7), 0 0 14px rgba(108, 182, 255, .45); }
        .field-card.reflect { box-shadow: 0 0 0 2px rgba(199, 152, 255, .75), 0 0 14px rgba(199, 152, 255, .4); }

        .legend {
            position: absolute;
            bottom: 12px;
            left: 12px;
            right: 12px;
            color: #9fb2da;
            font-size: 12px;
            text-align: center;
        }

        @keyframes airborneHover {
            0%, 100% { transform: translateY(-8px); }
            50% { transform: translateY(-16px); }
        }
        @keyframes burnBorder {
            0% { transform: rotate(0deg); filter: blur(1px) brightness(1); }
            100% { transform: rotate(360deg); filter: blur(1.3px) brightness(1.12); }
        }
        @keyframes flameDance {
            from { transform: translateY(0) scaleY(1); opacity: .72; }
            to { transform: translateY(-2px) scaleY(1.13); opacity: .95; }
        }
        @keyframes idleFloat {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        @media (max-width: 980px) {
            body { grid-template-columns: 1fr; }
            .controls { max-height: initial; }
            .field { min-height: 360px; }
        }
    </style>
</head>
<body>
<aside class="panel controls">
    <h1>Field Card Status Demo</h1>
    <div class="sub">
        체크박스로 상태효과를 켜고 끄면서 카드에 어떤 식으로 "대충 보이는 표시"를 줄지 확인하는 데모입니다.
    </div>

    <div class="group">
        <h2>은신/위치 계열</h2>
        <label class="toggle"><span>Stealth</span><input type="checkbox" data-effect="stealth"></label>
        <label class="toggle"><span>Burrowed</span><input type="checkbox" data-effect="burrowed"></label>
        <label class="toggle"><span>Airborne</span><input type="checkbox" data-effect="airborne"></label>
        <label class="toggle"><span>GravityFluxAirborne</span><input type="checkbox" data-effect="gravity_flux_airborne"></label>
        <label class="toggle"><span>Pulled</span><input type="checkbox" data-effect="pulled"></label>
        <label class="toggle"><span>Hooked</span><input type="checkbox" data-effect="hooked"></label>
    </div>

    <div class="group">
        <h2>피해/군중제어 계열</h2>
        <label class="toggle"><span>Burn</span><input type="checkbox" data-effect="burn"></label>
        <label class="toggle"><span>FrozenState</span><input type="checkbox" data-effect="frozen_state"></label>
        <label class="toggle"><span>Exposed</span><input type="checkbox" data-effect="exposed"></label>
        <label class="toggle"><span>HealBlock</span><input type="checkbox" data-effect="heal_block"></label>
        <label class="toggle"><span>SkillSilence</span><input type="checkbox" data-effect="skill_silence"></label>
        <label class="toggle"><span>Taunt</span><input type="checkbox" data-effect="taunt"></label>
    </div>

    <div class="group">
        <h2>방어/강화 계열</h2>
        <label class="toggle"><span>Barrier / ParticleBarrier</span><input type="checkbox" data-effect="barrier"></label>
        <label class="toggle"><span>DamageReduction</span><input type="checkbox" data-effect="damage_reduction"></label>
        <label class="toggle"><span>Reflect</span><input type="checkbox" data-effect="reflect"></label>
        <label class="toggle"><span>Immortality</span><input type="checkbox" data-effect="immortality"></label>
        <label class="toggle"><span>AttackBuff / DamageMultiplier</span><input type="checkbox" data-effect="attack_buff"></label>
        <label class="toggle"><span>ExtraHP</span><input type="checkbox" data-effect="extra_hp"></label>
    </div>

    <div class="preset">
        <button class="btn" data-preset="stealth">Preset: 은신</button>
        <button class="btn" data-preset="burning">Preset: 불타는 카드</button>
        <button class="btn" data-preset="air-control">Preset: 공중제어</button>
        <button class="btn" data-preset="tanky">Preset: 탱커 생존</button>
        <button class="btn" data-preset="clear">전체 해제</button>
    </div>
</aside>

<main class="panel stage">
    <div class="field">
        <div class="card-wrap" id="cardWrap">
            <article class="field-card" id="fieldCard">
                <div class="badge" id="stateBadge"></div>
                <div class="effect-tags" id="effectTags"></div>
                <div class="hero-art"></div>
                <div class="meta">
                    <div class="name">Sojourn</div>
                    <div class="desc">Railgun 사용자 · 상태효과 UI 샘플 카드</div>
                </div>
                <div class="stats">
                    <span class="hp" id="hp">♥ 6</span>
                    <span class="atk">⚔ 3</span>
                    <span class="rng">◎ 3</span>
                </div>
            </article>
        </div>
        <div class="legend" id="legend"></div>
    </div>
</main>

<script>
    const card = document.getElementById('fieldCard');
    const wrap = document.getElementById('cardWrap');
    const badge = document.getElementById('stateBadge');
    const tags = document.getElementById('effectTags');
    const hpEl = document.getElementById('hp');
    const legend = document.getElementById('legend');
    const toggles = [...document.querySelectorAll('input[data-effect]')];

    const ALL_EFFECTS = [
        'barrier','particle_barrier','airborne','gravity_flux_airborne','stealth','burrowed','exposed','knockback',
        'pulled','hooked','attack_buff','damage_multiplier','range_modifier','damage_reduction',
        'next_turn_start_damage_reduction','heal_block','heal_amplify','heal_multiplier','discord_orb','taunt',
        'skill_silence','burn','sticky_bomb','frozen_state','frozen_revive','immortality','reflect','extra_hp',
        'mech_destruction','charging','orisa_fortify_passive'
    ];

    const BADGE_PRIORITY = ['frozen_state', 'airborne', 'gravity_flux_airborne', 'burrowed', 'stealth', 'hooked', 'pulled', 'exposed'];
    const LABEL = {
        stealth: '은신', burrowed: '잠복', airborne: 'AIR', gravity_flux_airborne: 'GRAV AIR',
        exposed: '노출', pulled: 'PULL', hooked: 'HOOK', frozen_state: 'FROZEN'
    };

    function activeEffects() {
        return toggles.filter((el) => el.checked).map((el) => el.dataset.effect);
    }

    function setEffects(next) {
        toggles.forEach((el) => { el.checked = next.includes(el.dataset.effect); });
        render();
    }

    function render() {
        const effects = activeEffects();

        ALL_EFFECTS.forEach((fx) => card.classList.remove(fx));
        wrap.classList.remove('airborne');

        effects.forEach((fx) => {
            if (fx === 'gravity_flux_airborne') {
                card.classList.add('airborne');
                wrap.classList.add('airborne');
            } else if (fx === 'barrier') {
                card.classList.add('damage_reduction');
            } else if (fx === 'particle_barrier') {
                card.classList.add('reflect');
            } else {
                card.classList.add(fx);
            }
            if (fx === 'airborne') wrap.classList.add('airborne');
        });

        const badgeFx = BADGE_PRIORITY.find((fx) => effects.includes(fx));
        if (badgeFx) {
            badge.textContent = LABEL[badgeFx] || badgeFx;
            badge.classList.add('show');
        } else {
            badge.classList.remove('show');
        }

        tags.innerHTML = '';
        const smallTags = effects.filter((fx) => !BADGE_PRIORITY.includes(fx));
        smallTags.slice(0, 5).forEach((fx) => {
            const el = document.createElement('span');
            el.textContent = fx.replaceAll('_', ' ').toUpperCase();
            tags.appendChild(el);
        });

        const bonusHp = effects.includes('extra_hp') ? 2 : 0;
        hpEl.textContent = `♥ ${6 + bonusHp}`;
        legend.textContent = effects.length
            ? `현재 효과: ${effects.map((x) => x.replaceAll('_', ' ')).join(', ')}`
            : '효과가 없으면 기본 카드 상태로 유지됩니다.';
    }

    document.querySelectorAll('[data-preset]').forEach((btn) => {
        btn.addEventListener('click', () => {
            const type = btn.dataset.preset;
            if (type === 'stealth') {
                setEffects(['stealth', 'exposed']);
            } else if (type === 'burning') {
                setEffects(['burn', 'heal_block']);
            } else if (type === 'air-control') {
                setEffects(['gravity_flux_airborne', 'pulled', 'hooked']);
            } else if (type === 'tanky') {
                setEffects(['barrier', 'damage_reduction', 'reflect', 'immortality', 'extra_hp']);
            } else {
                setEffects([]);
            }
        });
    });

    toggles.forEach((el) => el.addEventListener('change', render));
    render();
</script>
</body>
</html>
